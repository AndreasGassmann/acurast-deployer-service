# Routing is handled by your existing Traefik via labels — no proxy in this file.
# Traefik must already run and own the external network below + the entrypoint/
# certresolver named in .env.
#
#   API_HOST, WEB_HOST           hostnames Traefik routes to these services
#   TRAEFIK_NETWORK              the external docker network Traefik is attached to
#   TRAEFIK_ENTRYPOINT           Traefik https entrypoint (e.g. websecure)
#   TRAEFIK_CERTRESOLVER         Traefik ACME cert resolver name

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PORT: "8080"
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.routers.qvac-api.rule=Host(`${API_HOST:-qvac-api.acurast.dev}`)"
      - "traefik.http.routers.qvac-api.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.qvac-api.tls=true"
      - "traefik.http.routers.qvac-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-le}"
      - "traefik.http.services.qvac-api.loadbalancer.server.port=8080"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # Baked into the static landing page at build time.
        PUBLIC_API_BASE: ${API_BASE_URL:-https://qvac-api.acurast.dev}
        PUBLIC_DEPLOY_KEY: ${PUBLIC_DEPLOY_KEY:-changeme-public-qvac-key}
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.routers.qvac-web.rule=Host(`${WEB_HOST:-qvac.acurast.dev}`)"
      - "traefik.http.routers.qvac-web.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.qvac-web.tls=true"
      - "traefik.http.routers.qvac-web.tls.certresolver=${TRAEFIK_CERTRESOLVER:-le}"
      - "traefik.http.services.qvac-web.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # static SPA-ish fallback for the single landing page
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
